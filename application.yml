spring:
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  kafka:
  bootstrap-servers: localhost:29092
  producer:
    key-serializer: org.apache.kafka.common.serialization.StringSerializer
    value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
  consumer:
    group-id: lovable-clone-group
    auto-offset-reset: earliest
    key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
    value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
    properties:
      spring.json.trusted.packages: "com.distributed_lovable_clone.*"      

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/  
    enabled: true
    register-with-eureka: true
    fetch-registry: true
  instance:
    prefer-ip-address: true
    hostname: localhost

jwt:
  secretKey: bcbhjvbhvbnvidfjbvibutijbiubvfj758587vcnbvvbmftrbvcvjebuuberufiefhieufgeuhieuryfeifueiuf

app:
  frontend:
    url: http://localhost:3000/frontend
  preview:
   domain: localhost
   namespace: lovable-apps
   proxy-port: 8080 

management:
  endpoints:
    web:
      exposure:
        include: health,info

  health:
    config:
      enabled: true

  logging:
    level:
      root: INFO
      org.apache.kafka.clients: WARN
      org.apache.kafka.common: WARN             
  
