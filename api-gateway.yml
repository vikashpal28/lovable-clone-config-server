server:
  port: 8080

app:
  security:
    public-routes:
      - "/api/v1/account/auth/signup"
      - "/api/v1/account/auth/login"
      - "/api/v1/account/webhooks/**"
      - "/api/v1/workspace/public/**"

spring:
  cloud:
    gateway.server.webflux:
      routes:
         #1. Route for account-service
        - id: account-service
          uri: ${ACCOUNT_SERVICE_URL:lb://account-service}
          predicates:
            - Path=/api/v1/account/**
          filters:
            - StripPrefix=2
        #2. Route for workspace-service
        - id: workspace-service
          uri: ${WORKSPACE_SERVICE_URL:lb://workspace-service}
          predicates:
            - Path=/api/v1/workspace/**
          filters:
            - StripPrefix=2    
        #3. Route for intelligence-service
        - id: intelligence-service
          uri: ${INTELLIGENCE_SERVICE_URL:lb://intelligence-service}
          predicates:
            - Path=/api/v1/intelligence/**
          filters:
            - StripPrefix=2